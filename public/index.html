<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Clown Chaos - Multiplayer Platformer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container"></div>

  <div id="ui-overlay">
    <div id="room-info">
      <span id="room-id"></span>
      <button id="copy-btn" title="Copy invite link">Copy Link</button>
    </div>
    <div id="player-count">Players: 1</div>
    <div id="controls-help">
      WASD/Arrows: Move &nbsp;|&nbsp; Space: Jump &nbsp;|&nbsp; E: Dance
    </div>
  </div>

  <div id="mobile-controls">
    <button class="touch-btn" id="btn-left">&#9664;</button>
    <button class="touch-btn" id="btn-right">&#9654;</button>
    <button class="touch-btn" id="btn-jump">JUMP</button>
    <button class="touch-btn" id="btn-dance">DANCE</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
